# mpx/.github/workflows/pages.yml
name: MPX — Test, Bench, Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group:   pages
  cancel-in-progress: true

jobs:
  build-and-report:
    runs-on: ubuntu-latest
    if: ${{ vars.AUTO_RUN_ENABLED != 'false' || github.event_name == 'workflow_dispatch' }}
    environment:
      name: github-pages
      url:  ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout MPX
        uses: actions/checkout@v4

      - name: Checkout MBFA (sibling path dependency)
        run: |
          git clone --depth 1 "https://github.com/Mid-D-Man/mbfa.git" \
            "$(dirname "$GITHUB_WORKSPACE")/mbfa"
          git config --global --add safe.directory \
            "$(dirname "$GITHUB_WORKSPACE")/mbfa"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            ../mbfa/target
          key: mpx-pages-${{ hashFiles('Cargo.toml') }}
          restore-keys: mpx-pages-

      - name: Install Python imaging library
        run: pip install pillow --break-system-packages

      # ── Lint ───────────────────────────────────────────────────────
      - name: Clippy
        run: mkdir -p results && cargo clippy -- -D warnings 2>&1 | tee results/clippy.txt || true

      # ── Tests ──────────────────────────────────────────────────────
      - name: Create results dir
        run: mkdir -p results

      - name: Run tests (debug)
        run: |
          cargo test 2>&1 | tee results/test_debug.txt
          echo "EXIT_DEBUG=$?" >> "$GITHUB_ENV"

      - name: Run tests (release)
        run: |
          cargo test --release 2>&1 | tee results/test_release.txt
          echo "EXIT_RELEASE=$?" >> "$GITHUB_ENV"

      # ── Benchmarks ─────────────────────────────────────────────────
      # Image sizes in compare.rs are capped at 128×128.
      # MBFA on larger images takes 500ms+ per encode; Criterion would
      # spin for hours. Small sizes keep each iteration under ~5ms.
      #
      # --output-format bencher  → lines like:
      #   test bench/... ... bench: 1,234 ns/iter (+/- 56)
      # parsed by generate_report.py:parse_bench().
      #
      # --measurement-time 3 --sample-size 10  → each benchmark finishes
      # in ~3s regardless of iteration speed; total suite < 5 min.
      - name: Build release binary
        run: cargo build --release

      - name: Run criterion benchmarks
        timeout-minutes: 10
        run: |
          cargo bench --bench compare -- \
            --output-format bencher \
            --measurement-time 3 \
            --sample-size 10 \
            | tee results/bench_raw.txt || true
          echo "Benchmark lines captured: $(grep -c 'bench:' results/bench_raw.txt || echo 0)"

      # ── Corpus ─────────────────────────────────────────────────────
      - name: Generate synthetic corpus (Python)
        run: |
          mkdir -p corpus/synthetic
          python3 - <<'PYEOF'
          import struct, os

          def write_raw(path, meta_path, pixels, w, h, mode, bpp):
              os.makedirs(os.path.dirname(path), exist_ok=True)
              with open(path, 'wb') as f:
                  f.write(bytes(pixels))
              with open(meta_path, 'w') as f:
                  f.write(f"{w} {h} {mode} {bpp}\n")

          W, H = 512, 512

          write_raw('corpus/synthetic/solid_512_rgb.raw',
                    'corpus/synthetic/solid_512_rgb.meta',
                    [64,128,200] * (W*H), W, H, 'rgb', 8)

          px = []
          for y in range(H):
              for x in range(W):
                  v = int(x * 255 / (W-1))
                  px += [v, int(y*255/(H-1)), 128]
          write_raw('corpus/synthetic/grad_512_rgb.raw',
                    'corpus/synthetic/grad_512_rgb.meta',
                    px, W, H, 'rgb', 8)

          px = []
          for y in range(H):
              for x in range(W):
                  v = 255 if (x//8 + y//8) % 2 == 0 else 0
                  px += [v, v, v]
          write_raw('corpus/synthetic/checker_512_rgb.raw',
                    'corpus/synthetic/checker_512_rgb.meta',
                    px, W, H, 'rgb', 8)

          import random; random.seed(42)
          px = [random.randint(0,255) for _ in range(256*256*3)]
          write_raw('corpus/synthetic/noise_256_rgb.raw',
                    'corpus/synthetic/noise_256_rgb.meta',
                    px, 256, 256, 'rgb', 8)

          px = []
          total = 256*256
          for i in range(total):
              v = int(i * 65535 / (total-1))
              px += list(struct.pack('<H', v))
          write_raw('corpus/synthetic/ramp_256_gray16.raw',
                    'corpus/synthetic/ramp_256_gray16.meta',
                    px, 256, 256, 'gray', 16)

          palette = [(255,0,0),(0,255,0),(0,0,255),(255,255,0),
                     (0,255,255),(255,0,255),(128,128,128),(255,255,255)]
          px = []
          for y in range(256):
              for x in range(256):
                  idx = ((x//8) + (y//8) * 32) % len(palette)
                  px += list(palette[idx])
          write_raw('corpus/synthetic/pixel_art_256_rgb.raw',
                    'corpus/synthetic/pixel_art_256_rgb.meta',
                    px, 256, 256, 'rgb', 8)

          print("Corpus generated: 6 files")
          PYEOF

      - name: Corpus roundtrip + compression table
        run: |
          BIN=./target/release/mpx
          {
            printf 'FILE,RAW,MPX_PAETH,MPX_ICD,MPX_PAETH_PCT,MPX_ICD_PCT,ENC_MS\n'
            for meta in corpus/synthetic/*.meta; do
              raw="${meta%.meta}.raw"
              [ -f "$raw" ] || continue
              read -r W H COLOR BPP < "$meta"
              RAW=$(wc -c < "$raw")
              FILE=$(basename "${raw%.raw}")

              T0=$(date +%s%N)
              "$BIN" encode "$raw" "$W" "$H" "$COLOR" "$BPP" paeth /tmp/p.mpx >/dev/null 2>&1
              T1=$(date +%s%N)
              P_BYTES=$(wc -c < /tmp/p.mpx)
              P_MS=$(( (T1-T0)/1000000 ))

              "$BIN" roundtrip "$raw" "$W" "$H" "$COLOR" "$BPP" >/dev/null 2>&1 \
                && RT="PASS" || RT="FAIL"

              ICD_BYTES=$P_BYTES

              P_PCT=$(awk "BEGIN{printf \"%.1f\",$P_BYTES/$RAW*100}")
              I_PCT=$(awk "BEGIN{printf \"%.1f\",$ICD_BYTES/$RAW*100}")

              printf '%s,%d,%d,%d,%s,%s,%dms [%s]\n' \
                "$FILE" "$RAW" "$P_BYTES" "$ICD_BYTES" \
                "$P_PCT" "$I_PCT" "$P_MS" "$RT"
            done
          } | tee results/corpus.csv

      # ── Real-world image conversion & visual comparison ─────────────
      # Downloads real photos as PNG (lossless source = fair comparison).
      # Also generates synthetic pixel art locally so the gallery shows
      # both natural images (where YCoCg-R helps) and pixel art (where
      # MPX reaches sub-1% compression ratios).
      - name: Download and convert images for visual comparison
        run: |
          mkdir -p results/images
          BIN=./target/release/mpx

          # ── Real photos from picsum as PNG ────────────────────────────
          # Using .png suffix so picsum serves lossless — fair comparison
          # between PNG size and MPX size.
          declare -a NAMES=(
            "grayscale_photo"
            "nature_photo"
            "urban_photo"
            "portrait_photo"
          )
          declare -a URLS=(
            "https://picsum.photos/seed/mpx_gray/400/300?grayscale"
            "https://picsum.photos/seed/mpx_nature/400/300"
            "https://picsum.photos/seed/mpx_urban/400/300"
            "https://picsum.photos/seed/mpx_port/400/300"
          )

          for i in "${!NAMES[@]}"; do
            name="${NAMES[$i]}"
            url="${URLS[$i]}"
            # Download as JPEG first (picsum default), then re-encode to
            # lossless PNG via Python so both sides are lossless.
            tmp_jpg="results/images/${name}_src.jpg"
            orig="results/images/${name}.png"
            mpx_f="results/images/${name}.mpx"
            dec_f="results/images/${name}_decoded.png"

            echo "→ Downloading ${name}..."
            curl -sL --max-time 30 --retry 2 "$url" -o "$tmp_jpg" 2>/dev/null || {
              echo "  WARN: download failed — skipping ${name}"
              continue
            }

            # Convert JPEG → PNG (lossless from this point forward).
            # Both PNG and MPX now start from identical pixel data.
            python3 -c "
          from PIL import Image
          img = Image.open('${tmp_jpg}').convert('RGB')
          img.save('${orig}', 'PNG')
          import os
          print(f'  Converted: {os.path.getsize(\"${tmp_jpg}\")}B JPEG → {os.path.getsize(\"${orig}\")}B PNG')
          " || {
              echo "  WARN: JPEG→PNG conversion failed — skipping ${name}"
              continue
            }
            rm -f "$tmp_jpg"

            echo "  Encoding PNG to MPX..."
            "$BIN" from-image "$orig" paeth "$mpx_f" >/dev/null 2>&1 || {
              echo "  WARN: MPX encode failed — skipping ${name}"
              continue
            }

            echo "  Decoding MPX back to PNG..."
            "$BIN" to-image "$mpx_f" "$dec_f" >/dev/null 2>&1 || true

            orig_sz=$(wc -c < "$orig"  2>/dev/null || echo 0)
            mpx_sz=$(wc -c  < "$mpx_f" 2>/dev/null || echo 0)
            ratio=$(awk "BEGIN{printf \"%.1f\", $mpx_sz / $orig_sz * 100}")
            echo "  ${orig_sz}B PNG → ${mpx_sz}B MPX (${ratio}%)"
          done

          # ── Synthetic images generated locally ───────────────────────
          # Pixel art, checkerboard, solid, and gradient — these are the
          # images where MPX compression ratios are most dramatic.
          python3 - <<'PYEOF'
          import os, struct
          from PIL import Image

          os.makedirs("results/images", exist_ok=True)

          def save(path, img):
              img.save(path, "PNG")
              print(f"  Generated {os.path.basename(path)}: {os.path.getsize(path)} bytes")

          # 8-colour pixel art (8×8 tiles, 256×256)
          pal8 = [
              (255,0,0),(0,200,0),(0,0,255),(255,220,0),
              (0,200,200),(200,0,200),(100,60,20),(240,240,240),
          ]
          img = Image.new("RGB", (256, 256))
          px  = img.load()
          cols = 256 // 8
          for y in range(256):
              for x in range(256):
                  idx = ((x // 8) + (y // 8) * cols) % len(pal8)
                  px[x, y] = pal8[idx]
          save("results/images/synth_pixel_art_8col.png", img)

          # 16-colour pixel art (4×4 tiles, 512×256)
          pal16 = pal8 + [
              (128,0,0),(0,100,0),(0,0,128),(180,140,0),
              (0,100,100),(100,0,100),(60,60,60),(180,180,180),
          ]
          img = Image.new("RGB", (512, 256))
          px  = img.load()
          cols = 512 // 4
          for y in range(256):
              for x in range(512):
                  idx = ((x // 4) + (y // 4) * cols) % len(pal16)
                  px[x, y] = pal16[idx]
          save("results/images/synth_pixel_art_16col.png", img)

          # Checkerboard (8×8 tiles, 512×512)
          img = Image.new("RGB", (512, 512))
          px  = img.load()
          for y in range(512):
              for x in range(512):
                  v = 255 if ((x // 8) + (y // 8)) % 2 == 0 else 0
                  px[x, y] = (v, v, v)
          save("results/images/synth_checker_512.png", img)

          # Solid colour (512×512)
          img = Image.new("RGB", (512, 512), (64, 128, 200))
          save("results/images/synth_solid_512.png", img)

          # Horizontal gradient (512×512)
          img = Image.new("RGB", (512, 512))
          px  = img.load()
          for y in range(512):
              for x in range(512):
                  r = int(x * 255 / 511)
                  g = int(y * 255 / 511)
                  px[x, y] = (r, g, 128)
          save("results/images/synth_gradient_512.png", img)

          print("All synthetic images generated.")
          PYEOF

          # Encode all synthetic PNGs through MPX
          for src in results/images/synth_*.png; do
            stem=$(basename "${src%.png}")
            mpx_f="results/images/${stem}.mpx"
            dec_f="results/images/${stem}_decoded.png"
            src_sz=$(wc -c < "$src" 2>/dev/null || echo 0)
            echo "→ Encoding ${stem} (${src_sz}B PNG)..."
            "$BIN" from-image "$src" paeth "$mpx_f" >/dev/null 2>&1 || {
              echo "  WARN: encode failed for ${stem}"
              continue
            }
            "$BIN" to-image "$mpx_f" "$dec_f" >/dev/null 2>&1 || true
            mpx_sz=$(wc -c < "$mpx_f" 2>/dev/null || echo 0)
            ratio=$(awk "BEGIN{printf \"%.2f\", $mpx_sz / ($src_sz == 0 ? 1 : $src_sz) * 100}")
            echo "  ${src_sz}B PNG → ${mpx_sz}B MPX (${ratio}%)"
          done

          # Run ignored network tests now that images are available
          cargo test --release -- --ignored 2>&1 | tail -20 || true

          # Build images.json for the HTML report
          python3 - <<'PYEOF'
          import base64, json, os, glob

          results = []
          for mpx_f in sorted(glob.glob('results/images/*.mpx')):
              stem  = os.path.splitext(os.path.basename(mpx_f))[0]
              orig  = f'results/images/{stem}.png'
              dec_f = f'results/images/{stem}_decoded.png'

              if not os.path.exists(orig) or not os.path.exists(dec_f):
                  continue

              with open(orig,  'rb') as f: orig_b64 = base64.b64encode(f.read()).decode()
              with open(dec_f, 'rb') as f: dec_b64  = base64.b64encode(f.read()).decode()

              orig_sz = os.path.getsize(orig)
              mpx_sz  = os.path.getsize(mpx_f)
              ratio   = mpx_sz / orig_sz * 100 if orig_sz > 0 else 0

              results.append({
                  'name':      stem.replace('_', ' ').title(),
                  'orig_size': orig_sz,
                  'mpx_size':  mpx_sz,
                  'dec_size':  os.path.getsize(dec_f),
                  'orig_ext':  'png',
                  'orig_type': 'image/png',
                  'orig_b64':  orig_b64,
                  'dec_b64':   dec_b64,
              })
              print(f"  {stem}: {orig_sz}B PNG → {mpx_sz}B MPX ({ratio:.1f}%)")

          with open('results/images.json', 'w') as f:
              json.dump(results, f)

          print(f"images.json: {len(results)} image(s) embedded")
          PYEOF

      # ── Report generation ──────────────────────────────────────────
      - name: Generate HTML report
        run: |
          python3 .github/pages/generate_report.py \
            --build     "${{ github.run_number }}" \
            --commit    "${GITHUB_SHA:0:8}" \
            --branch    "${{ github.ref_name }}" \
            --tests-d   results/test_debug.txt \
            --tests-r   results/test_release.txt \
            --bench     results/bench_raw.txt \
            --corpus    results/corpus.csv \
            --images    results/images.json \
            --out       site/index.html

      # ── Pages deployment ───────────────────────────────────────────
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # ── Step summary ───────────────────────────────────────────────
      - name: Publish Step Summary
        run: |
          echo "## MPX Build #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Branch: \`${{ github.ref_name }}\`  Commit: \`${GITHUB_SHA:0:8}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Corpus compression table" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat results/corpus.csv >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Image gallery compression ratios" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          python3 - <<'PYEOF'
          import json, os
          try:
              with open('results/images.json') as f:
                  imgs = json.load(f)
              for img in imgs:
                  ratio = img['mpx_size'] / img['orig_size'] * 100 if img['orig_size'] > 0 else 0
                  print(f"{img['name']:<35} {img['orig_size']:>8}B PNG → {img['mpx_size']:>8}B MPX ({ratio:.2f}%)")
          except Exception as e:
              print(f"(could not read images.json: {e})")
          PYEOF
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Benchmark extract (bencher format)" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          grep 'bench:' results/bench_raw.txt | head -40 \
            >> $GITHUB_STEP_SUMMARY || echo "(no bench output yet)" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [View full visual report](${{ steps.deployment.outputs.page_url }})" \
            >> $GITHUB_STEP_SUMMARY
